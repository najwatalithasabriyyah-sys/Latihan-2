<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Toko Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        h1 {
            text-align: center;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .products, .cart {
            background: white;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
        }
        .product {
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        button {
            padding: 5px 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<h1>Toko Online Sederhana</h1>

<div class="container">
    <!-- Produk -->
    <div class="products">
        <h2>Produk</h2>
        <div class="product">
            <p>Kaos - Rp 100.000</p>
            <button onclick="addToCart('Kaos', 100000)">Tambah</button>
        </div>
        <div class="product">
            <p>Sepatu - Rp 250.000</p>
            <button onclick="addToCart('Sepatu', 250000)">Tambah</button>
        </div>
        <div class="product">
            <p>Topi - Rp 75.000</p>
            <button onclick="addToCart('Topi', 75000)">Tambah</button>
        </div>
    </div>

    <!-- Keranjang -->
    <div class="cart">
        <h2>Keranjang</h2>
        <ul id="cart-list"></ul>
        <h3>Total: Rp <span id="total">0</span></h3>
    </div>
</div>

<script>
    let total = 0;

    function addToCart(nama, harga) {
        const cartList = document.getElementById("cart-list");

        const li = document.createElement("li");
        li.textContent = nama + " - Rp " + harga.toLocaleString();
        cartList.appendChild(li);

        total += harga;
        document.getElementById("total").textContent = total.toLocaleString();
    }
</script>

</body>
</html>
